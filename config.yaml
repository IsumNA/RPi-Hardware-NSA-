# =============================================================================
#  NSA  -  Neural Architecture Search
#  6-Level Optimization Stack  ::  Compilation Profile
# =============================================================================
#  This is the single source of truth your manager edits for the demo.
#  Every flag here maps to one concrete decision inside the optimization stack.
#  Any value can be overridden on the command line, e.g.:
#       python run_demo.py --hardware hailo8 --model-family nafnet
# =============================================================================

# ---- LEVEL 6 : Export / Target Hardware --------------------------------------
#   rpi5_cpu   -> Raspberry Pi 5  (ARM Cortex-A76, ONNX FP16)
#   hailo8     -> Raspberry Pi 5 + Hailo-8 AI HAT  (.hef, INT8)
#   deepx      -> DeepX DX-M1 M.2 accelerator      (.bin, INT8)
#   intel_npu  -> Intel AI Boost NPU via OpenVINO  (.xml, FP16)
hardware: rpi5_cpu

# ---- LEVEL 3 : Model Architecture --------------------------------------------
model:
  model_family: nafnet      # cnn|dncnn|unet|rednet|ridnet|nafnet|ffdnet|drunet|restormer
  base_channels: 16         # 16 | 32 | 64
  block_depth: 4            # 2  | 4  | 8  (REDNet min 2; UNet/DRUNet halved per stage)
  conv_type: depthwise      # standard | depthwise  (ignored for nafnet / restormer)
  activation: relu          # relu | gelu | silu  (ignored for nafnet / restormer)
  # Custom multi-scale NAFNet topology (nafnet family only). Leave empty for a
  # flat NAFNet of block_depth blocks. The U-shaped topology below downsamples
  # 8x at the bottleneck — the receptive field a flat 4-block model lacks, which
  # is what removes LOW-FREQUENCY chroma blotches on very grainy captures
  # (a flat model literally cannot see structure larger than a few dozen px).
  nafnet_enc_blocks: [1, 1, 2]   # per-level encoder NAFBlock counts (U-shaped NAFNet)
  nafnet_middle_blocks: 2        # bottleneck block count
  nafnet_dec_blocks: [1, 1, 1]   # per-level decoder NAFBlock counts

# ---- LEVEL 1 : Sensor / Input ------------------------------------------------
sensor:
  # Image sensor profile (drives the physics-based noise injection):
  #   imx219  -> legacy Camera Module v2 (noisy, messy chroma)
  #   imx662  -> current Starvis 2 (low read noise)
  #   imxng   -> unreleased next-gen low-light Starvis 2 (shot-noise limited)
  sensor: imx662
  # Path to a real Bayer RAW frame. If null or missing, the stack synthesises a
  # physically-plausible RAW for the chosen sensor so the demo runs out-of-the-box.
  input_raw: null
  # Real-capture mode: load actual frames instead of synthesising noise.
  #   real_capture: true  -> the frame from dataset_path/input_raw is used AS the
  #                          noisy input (a clean reference is built for it).
  #   dataset_path        -> a folder (or single file) of real RAW/image captures,
  #                          e.g. a cloned repo of IMX219 frames. A frame is picked
  #                          per-seed so re-runs can show different captures.
  real_capture: true
  # Prefer the repo-local datasets/PI_RAW (now holds the real imx662/imx662h
  # pairs copied from the AI server). On the AI box, finalize_dataset_config
  # still auto-upgrades this default to /opt/datasets/PI_RAW when present.
  dataset_path: datasets/PI_RAW
  # Paired folders (a noisy.* + gt.* per folder, the denoise-hw convention) are
  # auto-detected and used as real ground truth. simulate_noise injects the
  # selected sensor's physics on top of loaded frames (clean -> noisy).
  simulate_noise: false
  # The selected sensor drives this filter (see DEFAULT_FILTERS_BY_SENSOR):
  # bare "imx662" matches BOTH imx662_ag*_test (LCG) and imx662h_ag*_test (HCG),
  # so the IMX662 sensor trains on every capture from that module.
  #   both LCG+HCG, all gains: [imx662]
  #   LCG-only:                [imx662_ag]
  #   HCG-only:                [imx662h]
  #   LCG at deploy gain only: [imx662_ag, ag256]
  filter: [imx662h]
  gain: 256                 # analog gain multiplier (256 = moderate; 512 = stress test)
  # Override the standard deviation of the injected Gaussian read noise, in
  # electrons RMS (the denoise-hw noise-floor knob). null keeps the sensor's
  # datasheet default; larger => noisier frames (e.g. imx219≈4, imx662≈2, try 8
  # for a stress test). Only affects simulated / simulate_noise injection.
  noise_std: null

# ---- LEVEL 2 : Ground-Truth / Data -------------------------------------------
data:
  temporal_frames: 256      # frames averaged to build the clean reference

# ---- LEVEL 4/5 : Optimization & Quantization ---------------------------------
optimization:
  quantize: false           # Hailo/DeepX need INT8; Intel NPU runs FP16 OpenVINO natively
  qat: false                # QAT only needed for INT8 NPU targets
  calibration_steps: 400    # live calibration iterations (batch of augmented crops)
  patch_size: 192           # working resolution for the live demo (square crop)
  # Extended training: after the quick calibration, keep training on EVERY paired
  # image matching the filter — this is where anti-blur quality comes from.
  # 50 LCG pairs (imx662_ag) need more steps than a single-folder pass.
  extended_train: true
  extended_steps: 3000      # optimizer steps for the extended full-dataset pass
  extended_max_side: 1024   # legacy resize cap — only used when extended_tile: 0
  # Native-resolution training tiles. Downscaling a noisy frame AVERAGES THE
  # GRAIN AWAY, so a model trained on resized images under-estimates real noise
  # and under-denoises at native resolution. Cut random native tiles instead.
  extended_tile: 512        # tile size in px (0 = legacy resize behaviour)
  extended_tiles_per_image: 4
  # Training-sample emphasis — weight = gain^gain_emphasis * (1 + dark_emphasis*darkness).
  # Oversamples the hard captures (very grainy high-analogue-gain folders, and
  # low-intensity scenes) instead of giving every folder equal attention.
  # ag512-dark ends up sampled ~20-60x more than ag1-bright. 0 / 0 = uniform.
  gain_emphasis: 0.5        # exponent on the folder's ag<N> analogue gain
  dark_emphasis: 2.0        # extra weight for dark scenes (mean intensity < 0.35)
  # Training objective. name may be a single term, a '+'-composite of terms
  # (summed as Sum of weight*term), or the charbonnier_ssim preset:
  #   l1 / l2 (mse)    -> plain MAE / MSE (l2 blurs texture; avoid on its own)
  #   charbonnier      -> sharp, robust pixel loss; tune charbonnier_eps
  #   huber            -> smooth-L1; tune huber_delta (L2->L1 crossover)
  #   ssim             -> structural similarity (1 - SSIM); tune ssim_window
  #   perceptual       -> LPIPS (deep-feature) distance; strongly fights blur
  #   edge             -> gradient-L1; keeps high-frequency detail / sharp edges
  #   charbonnier_ssim -> (1-w)*charbonnier + w*(1-SSIM) blend; tune ssim_weight (w)
  loss:
    # Anti-blur composite: sharp pixel loss (charbonnier) + stationary-wavelet
    # (SWT) subband matching. SWT beat the single-band 'edge' term on held-out
    # imx662h ag512 (PSNR +0.14 dB, LPIPS -7%) at zero inference cost — see
    # outputs/pi5_ag512_search/swt_tlc_results.json. No perceptual term in
    # TRAINING, so nothing can hallucinate texture.
    name: charbonnier+swt
    charbonnier_eps: 0.0005  # smaller = closer to L1 (sharper), larger = smoother
    huber_delta: 1.0
    ssim_window: 11          # odd Gaussian window for the SSIM term
    ssim_weight: 0.22        # charbonnier_ssim blend weight (0..1)
    # Per-term weights for composite losses (only the selected terms are used).
    weights:
      charbonnier: 1.0
      swt: 0.1

# ---- Run mode ----------------------------------------------------------------
run:
  mode: single              # single | batch | temporal
  batch_size: 6             # frames processed + averaged in batch mode
  burst: 8                  # frames in a temporal-denoise burst (mode: temporal)
  temporal_alpha: 0.6       # IIR blend weight for temporal video denoise

# ---- Output ------------------------------------------------------------------
output:
  dir: outputs
  show_window: true         # open the 3-panel validation matrix
  seed: 662
  # Which capture the validation matrix tests on across an analog-gain sweep
  # (imx662_ag1..ag512): high = noisiest (default, the low-light stress test),
  # low = cleanest, first = dataset order, or a gain number (e.g. 512).
  validate_gain: high
  # Detail-restore unsharp mask on the DENOISED output (0 = off). Counters the
  # soft "conditional mean" look of regression denoisers; measured on held-out
  # ag512 frames it improves LPIPS at near-zero PSNR cost (no hallucination —
  # it only restores micro-contrast the denoiser kept but flattened).
  sharpen: 0.5
  # Auto-copy result images to somewhere you can view them after each compile,
  # e.g. your laptop. Must be SSH-reachable FROM this machine (sshd running).
  # Password: export NSA_RESULTS_PASS=... (needs sshpass) or use key-based auth.
  # Empty = off. Also available on demand via the results screen's SEND RESULTS.
  results_dest: ""          # e.g. you@laptop:~/nsa_results

# ---- Pi live testing (GUI LIVE TEST on AI server → Pi camera over SSH) ------
pi_live:
  enabled: true             # false = local LiveView only
  # Fallback SSH target. When you connect in the camera-capture wizard, LIVE TEST
  # reuses THAT same Pi SSH target automatically; this is only used if you never
  # opened capture this session (no shared target yet).
  ssh_host: pi@10.3.31.153  # lab Pi (or YOUR_USER@10.x.x.x)
  repo: ~/RPi-Hardware-NSA- # path to this repo ON THE PI
  source: picamera          # picamera | rpicam | opencv | auto
  display: auto             # auto-detect Pi desktop (X11/Wayland). "" = headless PNG.
  venv: auto                # Pi virtualenv: auto (.venv/venv/env) or an explicit path
  # Verify before launching:  python -m nsa.pi_remote --check
